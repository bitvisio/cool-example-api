apiVersion: apps/v1
kind: Deployment
metadata:
  name: REPO_NAME
spec:
  replicas: 1 
  selector:
    matchLabels:
      app: REPO_NAME
  template:
    metadata:
      labels:
        app: REPO_NAME
    spec:
      containers:
      - name: REPO_NAME
        image: REPO_NAME:version
        ports:
        - containerPort: 5000
        env:
        - name: ENVIRONMENT
          value: "default"
