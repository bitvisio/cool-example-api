apiVersion: apps/v1
kind: Deployment
metadata:
  name: REPO_NAME
spec:
  replicas: 1
  selector:
    matchLabels:
      environment: qa
  template:
    metadata:
      labels:
        environment: qa
    spec:
      containers:
      - name: REPO_NAME
        env:
        - name: ENVIRONMENT
          value: "qa"
