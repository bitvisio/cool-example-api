apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: REPO_NAME-ingress
spec:
  ingressClassName: nginx
  rules:
  - host: qa-api.cool.noterm.app
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: qa-REPO_NAME
            port:
              number: 80