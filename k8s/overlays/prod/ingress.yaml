apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: REPO_NAME-ingress
spec:
  ingressClassName: nginx
  rules:
  - host: prod-api.Cool.testcompany.net
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: REPO_NAME
            port:
              number: 80