name: Deploy - Local

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r dev-requirements.txt

      - name: Run tests
        run: |
          PYTHONPATH=./ pytest test/api/test_message_api.py
          PYTHONPATH=./ pytest test/service/test_message_service.py

  deploy_local_qa:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.20.0'

      - name: Create .kube directory
        run: |
          mkdir -p /root/.kube

      - name: Decode KUBECONFIG
        run: echo "${{ secrets.KUBECONFIG_DEV }}" | base64 --decode > /root/.kube/config

      - name: Install toml module
        run: |
          python -m pip install toml

      - name: Get version and set it as environment variable
        run: |
          VERSION=$(python -c "import toml; print(toml.load('pyproject.toml')['project']['version'])")
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Replace image placeholder in manifest
        run: |
          sed -i "s|REPO_NAME:version|${{ vars.REPO_NAME }}:${{ env.VERSION }}|g" k8s/base/deployment.yaml
        
      - name: Replace repository name placeholders
        run: |
          find k8s/ -type f -name "*.yaml" -exec sed -i "s|REPO_NAME|${{ vars.REPO_NAME }}|g" {} +

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -k k8s/overlays/qa

  deploy_local_prod:
    runs-on: ubuntu-latest
    needs: deploy_local_qa

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.20.0'

      - name: Create .kube directory
        run: |
          mkdir -p /root/.kube

      - name: Decode KUBECONFIG
        run: echo "${{ secrets.KUBECONFIG_DEV }}" | base64 --decode > /root/.kube/config

      - name: Install toml module
        run: |
          python -m pip install toml

      - name: Get version and set it as environment variable
        run: |
          VERSION=$(python -c "import toml; print(toml.load('pyproject.toml')['project']['version'])")
          echo "VERSION=$VERSION" >> $GITHUB_ENV
  
      - name: Replace image placeholder in manifest
        run: |
          sed -i "s|REPO_NAME:version|${{ vars.REPO_NAME }}:${{ env.VERSION }}|g" k8s/base/deployment.yaml
        
      - name: Replace repository name placeholders
        run: |
          find k8s/ -type f -name "*.yaml" -exec sed -i "s|REPO_NAME|${{ vars.REPO_NAME }}|g" {} +

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -k k8s/overlays/prod