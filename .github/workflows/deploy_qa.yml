name: Deploy - QA

on:
  push:
    branches:
      - test

jobs:
  test:
    runs-on: [ test1 ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r dev-requirements.txt

      - name: Run tests
        run: |
          PYTHONPATH=./ pytest test/api/test_message_api.py
          PYTHONPATH=./ pytest test/service/test_message_service.py

  build_and_push:
    runs-on: [ test1 ]
    needs: test

    outputs:
      VERSION: ${{ steps.get_version.outputs.VERSION }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install toml module
        run: |
          python -m pip install toml

      - name: Get version from pyproject.toml and set it as a env variable and as a output
        id: get_version
        run: |
          VERSION=$(python -c "import toml; print(toml.load('pyproject.toml')['project']['version'])")
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Create tag
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: 'refs/tags/v${{ env.VERSION }}',
              sha: context.sha
            })

      - name: Login to JFrog
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ARTIFACTORY_URL }}
          username: ${{ secrets.ARTIFACTORY_USERNAME }}
          password: ${{ secrets.ARTIFACTORY_PASSWORD }}
          
      - name: Build and push Docker image to artifactory
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ secrets.ARTIFACTORY_URL }}/${{ vars.REPO_NAME }}:${{ env.VERSION }}
  
  deploy_qa:
    runs-on: [ test1 ]
    needs: build_and_push

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
          
      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.20.0'

      - name: Create .kube directory
        run: |
          mkdir -p $HOME/.kube
  
      - name: Decode KUBECONFIG_TEST
        run: echo "${{ secrets.KUBECONFIG_TEST }}" | base64 --decode > $HOME/.kube/config

      - name: Replace image placeholder in manifest
        env:
          VERSION: ${{ needs.build_and_push.outputs.VERSION }}
        run: |
          sed -i "s|REPO_NAME:version|${{ secrets.ARTIFACTORY_URL }}/${{ vars.REPO_NAME }}:${{ env.VERSION }}|g" k8s/base/deployment.yaml
        
      - name: Replace repository name placeholders
        run: |
          find k8s/ -type f -name "*.yaml" -exec sed -i "s|REPO_NAME|${{ vars.REPO_NAME }}|g" {} +
      
      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -k k8s/overlays/qa
